<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DID Brain · 解離性身份障礙文獻日報</title>
<style>
  :root { --bg: #f6f1e8; --surface: #fffaf2; --line: #d8c5ab; --text: #2b2118; --muted: #766453; --accent: #8c4f2b; --accent-soft: #ead2bf; }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: radial-gradient(circle at top, #fff6ea 0, var(--bg) 55%, #ead8c6 100%); color: var(--text); font-family: "Noto Sans TC", "PingFang TC", "Helvetica Neue", Arial, sans-serif; min-height: 100vh; }
  .container { position: relative; z-index: 1; max-width: 640px; margin: 0 auto; padding: 80px 24px; }
  .logo { font-size: 48px; text-align: center; margin-bottom: 16px; }
  h1 { text-align: center; font-size: 24px; color: var(--text); margin-bottom: 8px; }
  .subtitle { text-align: center; color: var(--accent); font-size: 14px; margin-bottom: 48px; }
  .count { text-align: center; color: var(--muted); font-size: 13px; margin-bottom: 32px; }
  .links-section { margin-top: 32px; }
  .link-row { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
  .link-row a { display: inline-flex; align-items: center; gap: 6px; padding: 10px 18px; font-size: 13px; color: var(--text); text-decoration: none; background: var(--surface); border: 1px solid var(--line); border-radius: 12px; transition: all 0.2s; }
  .link-row a:hover { background: var(--accent-soft); border-color: var(--accent); }
  .empty { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 15px; line-height: 1.8; }
  footer { margin-top: 56px; text-align: center; font-size: 12px; color: var(--muted); }
  footer a { color: var(--muted); text-decoration: none; }
  footer a:hover { color: var(--accent); }
</style>
</head>
<body>
<div class="container">
  <div class="logo">🧠</div>
  <h1>DID Brain</h1>
  <p class="subtitle">解離性身份障礙文獻日報 · 每日自動更新</p>
  <p class="count">即將開始更新...</p>
  <div class="empty">
    <p>本站每日自動從 PubMed 抓取最新的 DID / 解離症相關文獻，</p>
    <p>由 AI 進行摘要、分類與分析，生成繁體中文日報。</p>
    <p style="margin-top: 16px;">首次日報將在 GitHub Actions 排程觸發後產生。</p>
  </div>
  <div class="links-section">
    <div class="link-row">
      <a href="https://www.leepsyclinic.com/" target="_blank">🏥 李政洋身心診所</a>
      <a href="https://blog.leepsyclinic.com/" target="_blank">📧 訂閱電子報</a>
      <a href="https://buymeacoffee.com/CYlee" target="_blank">☕ Buy Me a Coffee</a>
    </div>
  </div>
  <footer>
    <p>Powered by PubMed + Zhipu AI · <a href="https://github.com/u8901006/did-brain">GitHub</a></p>
  </footer>
</div>
</body>
</html>
